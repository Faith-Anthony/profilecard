<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Anthony - Profile Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page-container">
        <article data-testid="test-profile-card" class="profile-card">
            <!-- Avatar Section -->
            <figure class="profile-avatar-wrapper">
                <img 
                    data-testid="test-user-avatar"
                    src="images/profile.jpg" 
                    alt="Faith Anthony, Frontend developer" 
                    class="profile-avatar"
                >
            </figure>

            <!-- Content Section -->
            <section class="profile-content">
                <!-- Header -->
                <header class="profile-header">
                    <h1 data-testid="test-user-name" class="profile-name">Faith Anthony</h1>
                    <p data-testid="test-user-bio" class="profile-bio">
                        Frontend developer passionate about building clean, responsive, and accessible web interfaces.
                    </p>
                </header>

                <!-- Time Display -->
                <div class="profile-time-section">
                    <span class="time-label">Current time (ms):</span>
                    <span data-testid="test-user-time" class="profile-time">0</span>
                </div>

                <!-- Social Links -->
                <nav data-testid="test-user-social-links" class="profile-social">
                    <a 
                        data-testid="test-user-social-github"
                        href="https://github.com/Faith-Anthony" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        class="social-link" 
                        aria-label="GitHub profile"
                        title="Visit GitHub"
                    >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </a>
                    <a 
                        data-testid="test-user-social-twitter"
                        href="https://x.com/Fainoch" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        class="social-link" 
                        aria-label="X profile"
                        title="Visit X"
                    >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.6l-5.165-6.755L2.98 21.75H.674l7.73-8.835L.391 2.25h6.774l4.963 6.44zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                    </a>
                    <a 
                        href="https://linkedin.com/in/faith-enoch" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        class="social-link" 
                        aria-label="LinkedIn profile"
                        title="Visit LinkedIn"
                    >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
                            <circle cx="4" cy="4" r="2"/>
                        </svg>
                    </a>
                    <a 
                        href="https://instagram.com/fainoch" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        class="social-link" 
                        aria-label="Instagram profile"
                        title="Visit Instagram"
                    >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="none" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z" fill="none" stroke="currentColor" stroke-width="2"/>
                            <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/>
                        </svg>
                    </a>
                </nav>

                <!-- Hobbies -->
                <section class="profile-section">
                    <h2 class="section-title">Hobbies</h2>
                    <ul data-testid="test-user-hobbies" class="interests-list">
                        <li class="interest-item">Coding</li>
                        <li class="interest-item">Music</li>
                        <li class="interest-item">Travelling</li>
                        <li class="interest-item">Hanging out with friends</li>
                    </ul>
                </section>

                <!-- Dislikes -->
                <section class="profile-section">
                    <h2 class="section-title">Dislikes</h2>
                    <ul data-testid="test-user-dislikes" class="interests-list">
                        <li class="interest-item">Slow internet</li>
                        <li class="interest-item">Too much noise</li>
                    </ul>
                </section>
            </section>
        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
